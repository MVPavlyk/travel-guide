services:
  db:
    image: postgres:16-alpine
    container_name: travel-guide-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: travel-guide
    ports:
      - "5432:5432"
    volumes:
      - travel-guide-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d travel-guide"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  travel-guide-pgdata:
